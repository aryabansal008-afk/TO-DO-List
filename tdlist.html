<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href='https://fonts.googleapis.com/css?family=Imbue' rel='stylesheet'>
    <link rel="stylesheet" href="tdlist.css">
</head>
<body>
    <h1>TO-DO List</h1>
    <div class="container">
        <div id = "add-task-container">
            <input type = "text" placeholder = "Enter Task" id = "input-task" autofocus>
            <button id="add-task"><i class="fa-solid fa-plus"></i></button>
        </div>
        <div id ="task-container"></div>
    </div>
    
    <div id="sidebar">
        <h2>Quicks</h2>
        <ul>
            <li>All Tasks</li>
            <li>Completed</li>
            <li>Pending</li>
            <li>Clear All</li>
        </ul>
    </div>

    <div id="overlay"></div>

    <script src="tdlist.js"></script>
</body>
</html>
